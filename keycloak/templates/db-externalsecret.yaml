# ExternalSecret — DB credentials from Vault.
# Prevents Bitnami's postgresql chart from rotating the password on every
# Helm re-render by pointing the chart at this Secret via auth.existingSecret.
#
# Vault path: kv/forge/keycloak-db
#   - password          (non-admin user, used by Keycloak app)
#   - postgres-password (superuser, optional but matches bitnami expectation)
#
# sync-wave -1 → materialize this Secret before the StatefulSet tries to mount
# it as env.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-db-creds
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-forge
    kind: ClusterSecretStore
  target:
    name: keycloak-db-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: password
      remoteRef:
        key: forge/keycloak-db
        property: password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: postgres-password
      remoteRef:
        key: forge/keycloak-db
        property: postgres-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
