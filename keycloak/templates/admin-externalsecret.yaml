# ExternalSecret — pulls Keycloak bootstrap admin creds from Vault.
#
# Vault path: kv/forge/keycloak
#   KC_BOOTSTRAP_ADMIN_USERNAME (defaults to "admin")
#   KC_BOOTSTRAP_ADMIN_PASSWORD (strong, generated once)
#
# The resulting K8s Secret "keycloak-admin" is referenced by keycloakx via
# extraEnvFrom → env vars fed directly into the Keycloak pod, used only on
# first-time bootstrap to create the initial admin user.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-admin
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-forge
    kind: ClusterSecretStore
  target:
    name: keycloak-admin
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: KC_BOOTSTRAP_ADMIN_USERNAME
      remoteRef:
        key: forge/keycloak
        property: KC_BOOTSTRAP_ADMIN_USERNAME
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: KC_BOOTSTRAP_ADMIN_PASSWORD
      remoteRef:
        key: forge/keycloak
        property: KC_BOOTSTRAP_ADMIN_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
