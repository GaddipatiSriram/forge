# Values for the Jenkins umbrella chart on OKD.
# Subchart name: `jenkins` — must match Chart.yaml dependency.
#
# Architecture:
#   - Single controller pod (StatefulSet) with 20Gi ceph-rbd PVC
#   - UI at https://jenkins.apps.mgmt-devops-okd.engatwork.com
#   - Admin creds chart-generated; migrate to Vault/ESO later (same pattern
#     as forge/keycloak)
#
# === GOTCHAS for OKD ===
# 1. runAsUser: null — OKD's restricted-v2 SCC forbids fixed UIDs. Letting
#    OKD assign a UID from the project's SCC range is the simplest fix.
#    If the chart still fails on SCC, grant the jenkins SA the
#    `nonroot-v2` SCC:  oc adm policy add-scc-to-user nonroot-v2 -z jenkins -n jenkins
# 2. Ingress → Route auto-conversion: OKD's ingress-operator wraps any
#    Ingress as a Route. `route.openshift.io/termination: edge` tells it to
#    terminate TLS at the router with the cluster wildcard cert.
# 3. Storage: ceph-rbd is RWO + durable. Do NOT use local-path — the
#    previous standalone install (now deleted) got stuck with PVC Pending
#    because local-path's WaitForFirstConsumer + the pod's stuck state
#    deadlocked each other.

jenkins:
  controller:
    # Let OKD SCC pick the UID/GID from the project's allocated range.
    runAsUser: null
    fsGroup: null

    # OKD SCCs enforce non-root policy themselves. runAsUser: null lets OKD
    # assign a UID from the SCC range. Do NOT set runAsNonRoot: true — it
    # clashes with the chart's init container that needs UID 0 to chown
    # /var/jenkins_home on first start (anyuid SCC granted to the jenkins SA
    # permits that).
    containerSecurityContext:
      runAsUser: null
      capabilities:
        drop:
          - ALL
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false

    # Chart 5.9.18 ships plugin defaults that require Jenkins >= 2.541.1.
    # Pin explicitly so chart<->plugins<->image stay consistent; the `lts-jdk17`
    # tag drifts to whatever the Jenkins project currently calls LTS.
    image:
      tag: "2.541.1-jdk17"

    serviceType: ClusterIP

    ingress:
      enabled: true
      ingressClassName: openshift-default
      hostName: jenkins.apps.mgmt-devops-okd.engatwork.com
      annotations:
        route.openshift.io/termination: edge

    # Admin creds: chart generates random password on first install, stored
    # in Secret/jenkins. Retrieve via:
    #   kubectl -n jenkins get secret jenkins -o jsonpath='{.data.jenkins-admin-password}' | base64 -d
    # Migrate to Vault later by setting admin.createSecret: false and mounting
    # a Vault-backed Secret via ESO.
    admin:
      createSecret: true

    # Plugin list omitted — chart default set is coherent with the default
    # image tag. Pinning plugins without also pinning a matching core version
    # caused "plugin requires Jenkins X.Y.Z" errors on first boot. Re-pin
    # AFTER we pin controller.image.tag to a specific LTS.

    # Resource requests — small; bump once we know real workload shape.
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 2
        memory: 2Gi

  # Agent pods (dynamic, kubernetes plugin). Defaults work on OKD.
  agent:
    enabled: true

  persistence:
    # ceph-rbd: RWO block volume from the central Rook-Ceph cluster on
    # mgmt-storage. See storage/rook-ceph/README.md for the issue log.
    # Issue #1 (OSDs advertising pod IPs) was closed by adding
    # network.addressRanges.public/cluster = 10.10.4.0/24 to the central
    # CephCluster and bouncing osd.0 + osd.1 to re-register with host IPs.
    enabled: true
    storageClass: ceph-rbd
    size: 20Gi
    accessMode: ReadWriteOnce

  serviceAccount:
    create: true
    name: jenkins
