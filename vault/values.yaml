# Values for the forge Vault umbrella chart.
# Everything under `vault:` is passed to the upstream hashicorp/vault chart
# (subchart name must match dependency .name in Chart.yaml).
#
# Deployment model: HA with integrated Raft storage on 3 replicas.
# Why Raft: zero external dependencies (no Consul/etcd), built-in, simple.
# Each pod owns a PVC for its Raft state (10Gi on local-path SC).
#
# First-time bootstrap (once pods are Running):
#   kubectl --context mgmt-forge exec -it -n vault vault-0 -- vault operator init
# → returns 5 unseal keys + 1 root token. SAVE THESE — lose them, lose data.
# Then unseal each pod (3 of 5 keys required per pod):
#   kubectl --context mgmt-forge exec -it -n vault vault-0 -- vault operator unseal <key>
#   (repeat for vault-1 and vault-2)
#
# Access:
#   - UI:  https://vault.apps.mgmt-forge.engatwork.com  (via ingress-nginx)
#   - API: same URL, token via -H "X-Vault-Token: <token>"

# =============================================================================
# Wrapper-chart values consumed by templates/ rendered alongside Vault.
# =============================================================================
# vault-pki ClusterIssuer (templates/clusterissuer-vault-pki.yaml). Override
# any of these per cluster if Vault ever ends up in a different namespace,
# auth path, or PKI role. Defaults match the live mgmt-forge install.
pki:
  vaultServer: "http://vault.vault.svc:8200"
  signPath: "pki/sign/platform-ingress"
  kubernetesAuthRole: "cert-manager-issuer"
  kubernetesAuthMountPath: "/v1/auth/kubernetes"
  serviceAccountName: "cert-manager"

vault:
  global:
    tlsDisable: true   # TLS terminated at ingress-nginx; internal pod-to-pod is cleartext
                       # on the homelab VLAN. Tighten later with cert-manager + Vault mTLS.

  server:
    image:
      repository: hashicorp/vault
      tag: "1.18.1"

    # HA with Raft — 3 replicas across forge nodes
    ha:
      enabled: true
      replicas: 3
      raft:
        enabled: true
        setNodeId: true
        config: |
          ui = true
          listener "tcp" {
            tls_disable = 1
            address = "[::]:8200"
            cluster_address = "[::]:8201"
          }
          storage "raft" {
            path = "/vault/data"
          }
          service_registration "kubernetes" {}

    # Pod anti-affinity: prefer distinct nodes, but allow two replicas on the
    # same node if needed (3-replica Raft on a 2-worker cluster — CP is tainted).
    # Switch to requiredDuringScheduling once you have >=3 schedulable nodes.
    affinity: |
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: {{ template "vault.name" . }}
                  app.kubernetes.io/instance: "{{ .Release.Name }}"
                  component: server
              topologyKey: kubernetes.io/hostname

    # Persistent storage for Raft state, per replica
    dataStorage:
      enabled: true
      size: 10Gi
      storageClass: local-path       # local-path-provisioner default SC on forge

    # Audit storage — off for now; enable once Vault is bootstrapped
    auditStorage:
      enabled: false

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # ----------------------------------------------------------------
    # Ingress via ingress-nginx, TLS issued by cert-manager via the
    # vault-pki ClusterIssuer (Vault's own PKI engine — see
    # forge/README.md "Identity + Secrets + Trust" for the loop).
    # cert-manager watches this Ingress, creates a Certificate keyed off
    # the cert-manager.io/cluster-issuer annotation + tls[].secretName,
    # and writes the resulting cert/key to the named Secret. ingress-nginx
    # then serves Vault's host with our PKI-signed cert instead of the
    # default self-signed one. That's the prerequisite for cross-cluster
    # ESO (mgmt-observability, dev-*) trusting Vault's API endpoint.
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/backend-protocol: HTTP
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        cert-manager.io/cluster-issuer: vault-pki
      hosts:
        - host: vault.apps.mgmt-forge.engatwork.com
          paths:
            - /
      tls:
        - hosts:
            - vault.apps.mgmt-forge.engatwork.com
          secretName: vault-tls

    # Readiness/liveness — Vault returns 429 when sealed, 200 when active.
    # Use standby-ok so non-leaders also pass liveness.
    # Probes have to tolerate pre-init state (501) and sealed state (503), or
    # the pod crashloops during bootstrap. Returning 204 for both keeps the pod
    # alive through `vault operator init` + the unseal ceremony.
    readinessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"
    livenessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"
      initialDelaySeconds: 60

  # Injector: sidecar-based secret injection (annotation-driven). Useful later
  # for pods that want secrets without ESO. Off by default to keep the footprint
  # small; we'll flip to true if/when we need annotation-based injection.
  injector:
    enabled: false

  # UI Service — ClusterIP; ingress handles external exposure above.
  ui:
    enabled: true
    serviceType: ClusterIP
