apiVersion: v2
name: trivy-operator-forge
description: Runtime vulnerability + config scanning (Aqua Trivy Operator) for every workload cluster
type: application
version: 0.1.0
appVersion: "0.30.1"

# Upstream chart: https://artifacthub.io/packages/helm/trivy-operator/trivy-operator
# Installed via a Pattern A ApplicationSet in argo/sre/ so every non-storage
# cluster automatically gets its own trivy-operator. Scan results live as
# CRDs on each cluster (VulnerabilityReport, ConfigAuditReport, etc.) —
# per-cluster scanning, per-cluster results.
dependencies:
  - name: trivy-operator
    version: "0.32.1"
    repository: https://aquasecurity.github.io/helm-charts/
