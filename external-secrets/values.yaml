# Values for the forge ESO umbrella chart.
# Everything under `external-secrets:` is passed to the upstream chart
# (subchart name must match dependency .name in Chart.yaml).

external-secrets:
  installCRDs: true

  replicaCount: 1

  # ServiceAccount name must match the one in Vault's auth role
  # (auth/kubernetes/role/forge-reader bound_service_account_names=external-secrets)
  serviceAccount:
    create: true
    name: external-secrets

  # Controller resources — homelab footprint
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  webhook:
    replicaCount: 1
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  certController:
    replicaCount: 1
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  # Metrics off for now (flip on once observability cluster is up)
  metrics:
    service:
      enabled: false

# Umbrella-chart toggles (not passed to subchart)
forgeSmokeTest:
  # Set to true to render an ExternalSecret in `default` namespace that pulls
  # kv/forge/hello from Vault. Useful for verifying the ESO → Vault loop after
  # initial deploy. Delete the value + re-sync once verified.
  enabled: true

# ClusterSecretStore (templates/cluster-secret-store.yaml) connection settings.
#
# We hit Vault via its public ingress hostname, NOT the in-cluster Service URL.
# That's the only reachable endpoint from the workload clusters this chart now
# deploys to (mgmt-observability, future dev-*) — and it works for mgmt-forge
# too, just one extra hop through ingress-nginx.
#
# TLS verification uses the engatwork.com Root CA from Vault's PKI engine.
# The CA cert is checked into git (CA certs aren't secrets) so every cluster
# trusts it consistently and the bootstrap stays fully GitOps. Rotate by:
#   - Re-keying the root in Vault (vault write pki/root/rotate/internal …)
#   - Pasting the new PEM in here + bumping the chart version
#   - ArgoCD reconciles every consumer cluster's ClusterSecretStore.
vault:
  serverUrl: "https://vault.apps.mgmt-forge.engatwork.com"
  # Per-cluster Kubernetes auth method mount name. The Vault auth method
  # is multi-mounted (one mount per cluster) so each cluster's TokenReview
  # validates against that cluster's own kube-apiserver. The
  # external-secrets ApplicationSet passes `kubernetes-{{name}}` here for
  # every cluster; the chart default is for direct/standalone testing.
  kubernetesAuthMount: "kubernetes-mgmt-forge"
