# ClusterSecretStore — tells ESO where Vault lives + how to authenticate.
# Cluster-scoped so ExternalSecrets in any namespace can reference it.
#
# Authentication: Kubernetes auth method.
#   ESO pod uses its ServiceAccount's JWT
#   → Vault validates via auth/kubernetes/
#   → Role "forge-reader" issues a 1h Vault token with policy "forge-reader"
#   → ESO reads kv/data/forge/* via that token.
#
# sync-wave "2" ensures this applies after the ESO CRDs are registered (wave 0
# from the subchart). SkipDryRunOnMissingResource handles the first-sync race.

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-forge
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    vault:
      server: "http://vault.vault.svc:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "forge-reader"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
