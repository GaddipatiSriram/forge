# ClusterSecretStore — tells ESO where Vault lives + how to authenticate.
# Cluster-scoped so ExternalSecrets in any namespace can reference it.
#
# Connection:
#   server   from .Values.vault.serverUrl — public ingress URL so this same
#            ClusterSecretStore works on every consumer cluster (mgmt-forge,
#            mgmt-observability, future dev-*). Trade-off: mgmt-forge ESO
#            takes one extra hop through ingress-nginx vs. the in-cluster
#            Service URL it used previously. Worth it for one code path.
#   caBundle from .Values.vault.caBundle — engatwork.com Root CA from Vault's
#            PKI engine, base64'd at render time. Without this the cross-
#            cluster traffic fails verification (the cert presented by Vault's
#            ingress is signed by a private CA).
#
# Authentication: Kubernetes auth method.
#   ESO pod uses its ServiceAccount's JWT
#   → Vault validates via auth/kubernetes/
#   → Role "forge-reader" issues a 1h Vault token with policy "forge-reader"
#   → ESO reads kv/data/forge/* via that token.
#
# sync-wave "2" ensures this applies after the ESO CRDs are registered (wave 0
# from the subchart). SkipDryRunOnMissingResource handles the first-sync race.

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-forge
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    vault:
      server: {{ .Values.vault.serverUrl | quote }}
      caBundle: {{ .Values.vault.caBundle | b64enc | quote }}
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: {{ .Values.vault.kubernetesAuthMount | quote }}
          role: "forge-reader"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
