{{- if .Values.forgeSmokeTest.enabled }}
# Smoke-test ExternalSecret — verifies the ESO → Vault loop end-to-end.
# Reads kv/forge/hello.message → writes Secret/hello-from-vault in `default` ns.
# Refreshed every 30 seconds, proves auth + policy + KV v2 all work.
#
# Once you've confirmed the Secret appears, delete by setting
# forgeSmokeTest.enabled=false in values.yaml and re-syncing.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hello-from-vault
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: vault-forge
    kind: ClusterSecretStore
  target:
    name: hello-from-vault
    creationPolicy: Owner
    deletionPolicy: Retain        # CRD default; declared explicitly to match live state
  data:
    - secretKey: message
      remoteRef:
        key: forge/hello
        property: message
        conversionStrategy: Default   # CRD defaults declared explicitly
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
